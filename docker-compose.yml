version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: vnparty_postgres
    environment:
      POSTGRES_USER: vnparty_dev
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: vnparty_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vnparty_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: vnparty_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
